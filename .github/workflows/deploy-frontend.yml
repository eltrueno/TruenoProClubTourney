name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Instalar dependencias
        # Solo frontend + lo que depende (shared). NO se instala eafcapi/backend
        # aqui a proposito: eafcapi trae puppeteer, y su postinstall intenta
        # descargar Chrome desde Google, lo cual falla con 403 en varios
        # runners de GitHub Actions y tira todo el deploy sin necesidad,
        # ya que el frontend no lo usa para nada.
        run: pnpm install --frozen-lockfile --filter @trueno-proclub-tourney/frontend...

      - name: Comprobar variables
        run: |
          echo "API='$PUBLIC_API_URL'"
          echo "AUTH='$PUBLIC_ROOT_AUTH_URL'"
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_ROOT_AUTH_URL: ${{ vars.PUBLIC_ROOT_AUTH_URL }}

      - name: Build del frontend
        run: pnpm --filter @trueno-proclub-tourney/frontend build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_ROOT_AUTH_URL: ${{ vars.PUBLIC_ROOT_AUTH_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
